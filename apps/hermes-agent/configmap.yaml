apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-agent-config
  namespace: hermes-agent
data:
  config.yaml: |
    model:
      provider: openai-codex
      default: gpt-5.3-codex
      base_url: https://chatgpt.com/backend-api/codex

    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 180
      lifetime_seconds: 300

    display:
      tool_progress: "new"
      busy_ack_enabled: true

    voice:
      record_key: "ctrl+b"
      max_recording_seconds: 120
      auto_tts: false
      beep_enabled: true
      silence_threshold: 200
      silence_duration: 3.0

    stt:
      enabled: true
      provider: openai
      openai:
        model: gpt-4o-transcribe

    platforms:
      telegram:
        enabled: true
        reply_to_mode: "all"
      api_server:
        enabled: true
        extra:
          host: "0.0.0.0"
          port: 8642
          model_name: "hermes-agent"

    platform_toolsets:
      telegram: [web, terminal, file, skills, todo, cronjob, messaging]
      api_server: [web, terminal, file, skills, todo, cronjob, messaging]
