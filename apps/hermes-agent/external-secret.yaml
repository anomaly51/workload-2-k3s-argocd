apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-agent-env
  namespace: hermes-agent
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: hermes-agent-env
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: workflow-2/hermes-agent
        property: telegram_bot_token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: HERMES_AUTH_JSON_BOOTSTRAP
      remoteRef:
        key: workflow-2/hermes-agent
        property: hermes_auth_json
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: API_SERVER_KEY
      remoteRef:
        key: workflow-2/hermes-agent
        property: api_server_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: VOICE_TOOLS_OPENAI_KEY
      remoteRef:
        key: workflow-2/hermes-agent
        property: openai_api_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: OBSIDIAN_LIVESYNC_SETUP_URI
      remoteRef:
        key: workflow-2/hermes-agent
        property: obsidian_livesync_setup_uri
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: OBSIDIAN_LIVESYNC_SETUP_PASSPHRASE
      remoteRef:
        key: workflow-2/hermes-agent
        property: obsidian_livesync_setup_passphrase
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: OBSIDIAN_LIVESYNC_E2EE_PASSPHRASE
      remoteRef:
        key: workflow-2/hermes-agent
        property: obsidian_livesync_e2ee_passphrase
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: OBSIDIAN_LIVESYNC_COUCHDB_USER
      remoteRef:
        key: workload-2/obsidian-livesync/couchdb
        property: adminUsername
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: OBSIDIAN_LIVESYNC_COUCHDB_PASSWORD
      remoteRef:
        key: workload-2/obsidian-livesync/couchdb
        property: adminPassword
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-pull-secret
  namespace: hermes-agent
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-pull-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"harbor.api-api-api.com":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: shared/harbor
        property: username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: password
      remoteRef:
        key: shared/harbor
        property: password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
