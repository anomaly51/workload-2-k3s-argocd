apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/part-of: workflow-2
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-agent
  template:
    metadata:
      annotations:
        hermes-agent/config-version: "2026-05-20-obsidian-fast-sync"
      labels:
        app.kubernetes.io/name: hermes-agent
        app.kubernetes.io/part-of: workflow-2
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - workload-2-k3s-worker-2
      imagePullSecrets:
        - name: harbor-pull-secret
      initContainers:
        - name: prepare-obsidian-vault
          image: harbor.api-api-api.com/hermes-agent/gateway:main-8-a01b9718f29cdefaf997d86c6ce08b859c88a487
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              mkdir -p "$OBSIDIAN_VAULT_DIR" "$OBSIDIAN_INBOX_DIR" /opt/data/Documents
              fallback="/opt/data/Documents/Obsidian Vault"
              old_inbox="$OBSIDIAN_VAULT_DIR/Inbox"
              if [ -d "$old_inbox" ] && [ "$old_inbox" != "$OBSIDIAN_INBOX_DIR" ]; then
                find "$old_inbox" -mindepth 1 -maxdepth 1 -exec mv -n -t "$OBSIDIAN_INBOX_DIR" {} +
                rmdir "$old_inbox" 2>/dev/null || true
              fi
              if [ -d "$fallback" ] && [ ! -L "$fallback" ]; then
                if [ -f "$fallback/Inbox.md" ]; then
                  mv "$fallback/Inbox.md" "$OBSIDIAN_INBOX_DIR/Inbox.md"
                fi
                find "$fallback" -mindepth 1 -maxdepth 1 -exec mv -t "$OBSIDIAN_VAULT_DIR" {} +
                rmdir "$fallback" 2>/dev/null || true
              fi
              ln -sfn "$OBSIDIAN_VAULT_DIR" "$fallback"
          env:
            - name: OBSIDIAN_VAULT_DIR
              value: /opt/data/workspace/obsidian-vault
            - name: OBSIDIAN_INBOX_DIR
              value: /opt/data/workspace/obsidian-vault/5. 📥 INBOX
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /opt/data
      containers:
        - name: gateway
          image: harbor.api-api-api.com/hermes-agent/gateway:main-8-a01b9718f29cdefaf997d86c6ce08b859c88a487
          imagePullPolicy: IfNotPresent
          args:
            - gateway
            - run
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_UID
              value: "10000"
            - name: HERMES_GID
              value: "10000"
            - name: HERMES_INFERENCE_PROVIDER
              value: openai-codex
            - name: HERMES_INFERENCE_MODEL
              value: gpt-5.3-codex
            - name: HERMES_CODEX_BASE_URL
              value: https://chatgpt.com/backend-api/codex
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "true"
            - name: TELEGRAM_REPLY_TO_MODE
              value: all
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: 0.0.0.0
            - name: API_SERVER_PORT
              value: "8642"
            - name: API_SERVER_CORS_ORIGINS
              value: https://hermes-agent.api-api-api.com
            - name: API_SERVER_MODEL_NAME
              value: hermes-agent
            - name: STT_OPENAI_MODEL
              value: gpt-4o-transcribe
            - name: STT_OPENAI_BASE_URL
              value: https://api.openai.com/v1
            - name: OBSIDIAN_VAULT_DIR
              value: /opt/data/workspace/obsidian-vault
            - name: OBSIDIAN_VAULT_PATH
              value: /opt/data/workspace/obsidian-vault
            - name: OBSIDIAN_INBOX_DIR
              value: /opt/data/workspace/obsidian-vault/5. 📥 INBOX
          envFrom:
            - secretRef:
                name: hermes-agent-env
          ports:
            - name: http
              containerPort: 8642
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: obsidian-inbox-skill
              mountPath: /opt/data/skills/obsidian-inbox
              readOnly: true
        - name: livesync-cli
          image: node:22-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              export DEBIAN_FRONTEND=noninteractive
              CLI_REF="${OBSIDIAN_LIVESYNC_CLI_REF:-0.25.62}"
              CLI_DIR="/tmp/obsidian-livesync-cli/${CLI_REF}"
              DIST="$CLI_DIR/src/apps/cli/dist/index.cjs"
              SETTINGS_DIR="$OBSIDIAN_VAULT_DIR/.livesync"
              SETTINGS="$SETTINGS_DIR/settings.json"

              if [ ! -f "$DIST" ]; then
                apt-get update
                apt-get install -y --no-install-recommends git python3 make g++ ca-certificates
                rm -rf /var/lib/apt/lists/*
                rm -rf "$CLI_DIR"
                git clone --depth 1 --branch "$CLI_REF" --recurse-submodules https://github.com/vrtmrz/obsidian-livesync.git "$CLI_DIR"
                cd "$CLI_DIR"
                if [ -f package-lock.json ]; then npm ci || npm install; else npm install; fi
                cd src/apps/cli
                npm run build
              fi

              mkdir -p "$OBSIDIAN_VAULT_DIR" "$OBSIDIAN_INBOX_DIR" "$SETTINGS_DIR"
              if ! node -e 'const fs=require("fs"); const p=process.argv[1]; const s=JSON.parse(fs.readFileSync(p,"utf8")); const rc=s && s.remoteConfigurations && Object.keys(s.remoteConfigurations).length > 0; const legacy=s && s.couchDB_URI && s.couchDB_USER && s.couchDB_PASSWORD && s.couchDB_DBNAME; process.exit(s && s.isConfigured && (rc || legacy) ? 0 : 1)' "$SETTINGS" 2>/dev/null; then
                echo "Configuring Self-hosted LiveSync CLI settings"
                node "$DIST" init-settings --force "$SETTINGS"
                node - "$SETTINGS" <<'NODE'
              const fs = require("fs");
              const settingsPath = process.argv[2];
              const settings = JSON.parse(fs.readFileSync(settingsPath, "utf8"));

              Object.assign(settings, {
                couchDB_URI: process.env.OBSIDIAN_LIVESYNC_URL,
                couchDB_USER: process.env.OBSIDIAN_LIVESYNC_COUCHDB_USER,
                couchDB_PASSWORD: process.env.OBSIDIAN_LIVESYNC_COUCHDB_PASSWORD,
                couchDB_DBNAME: process.env.OBSIDIAN_LIVESYNC_DB || "obsidian-notes",
                liveSync: true,
                syncOnStart: false,
                syncOnSave: false,
                usePluginSync: false,
                encrypt: true,
                passphrase: process.env.OBSIDIAN_LIVESYNC_E2EE_PASSPHRASE,
                usePathObfuscation: true,
                handleFilenameCaseSensitive: false,
                customChunkSize: 60,
                doNotUseFixedRevisionForChunks: false,
                isConfigured: true,
              });

              fs.writeFileSync(settingsPath, JSON.stringify(settings, null, 2));
              NODE
              fi

              node - "$SETTINGS" <<'NODE'
              const fs = require("fs");
              const settingsPath = process.argv[2];
              const settings = JSON.parse(fs.readFileSync(settingsPath, "utf8"));

              Object.assign(settings, {
                liveSync: true,
                syncOnStart: false,
                syncOnSave: false,
                usePluginSync: false,
                usePathObfuscation: true,
                handleFilenameCaseSensitive: false,
                customChunkSize: 60,
                doNotUseFixedRevisionForChunks: false,
                isConfigured: true,
              });

              fs.writeFileSync(settingsPath, JSON.stringify(settings, null, 2));
              NODE

              exec node "$DIST" "$OBSIDIAN_VAULT_DIR" --settings "$SETTINGS" --interval 2 daemon
          env:
            - name: OBSIDIAN_LIVESYNC_CLI_REF
              value: "0.25.62"
            - name: OBSIDIAN_LIVESYNC_URL
              value: https://obsidian-livesync.api-api-api.com
            - name: OBSIDIAN_LIVESYNC_DB
              value: obsidian-notes
            - name: OBSIDIAN_VAULT_DIR
              value: /opt/data/workspace/obsidian-vault
            - name: OBSIDIAN_VAULT_PATH
              value: /opt/data/workspace/obsidian-vault
            - name: OBSIDIAN_INBOX_DIR
              value: /opt/data/workspace/obsidian-vault/5. 📥 INBOX
          envFrom:
            - secretRef:
                name: hermes-agent-env
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-data
        - name: config
          configMap:
            name: hermes-agent-config
        - name: obsidian-inbox-skill
          configMap:
            name: hermes-agent-obsidian-inbox-skill
