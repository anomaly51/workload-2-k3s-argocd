apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/part-of: workflow-2
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-agent
  template:
    metadata:
      annotations:
        hermes-agent/config-version: "2026-05-19-toolsets"
      labels:
        app.kubernetes.io/name: hermes-agent
        app.kubernetes.io/part-of: workflow-2
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: gateway
          image: harbor.api-api-api.com/hermes-agent/gateway:main-1-11eed3e86d1da8da05ab73fdaa517a0246f7e335
          imagePullPolicy: IfNotPresent
          args:
            - gateway
            - run
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_UID
              value: "10000"
            - name: HERMES_GID
              value: "10000"
            - name: HERMES_INFERENCE_PROVIDER
              value: openai-codex
            - name: HERMES_INFERENCE_MODEL
              value: gpt-5.3-codex
            - name: HERMES_CODEX_BASE_URL
              value: https://chatgpt.com/backend-api/codex
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "true"
            - name: TELEGRAM_REPLY_TO_MODE
              value: all
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: 0.0.0.0
            - name: API_SERVER_PORT
              value: "8642"
            - name: API_SERVER_CORS_ORIGINS
              value: https://hermes-agent.api-api-api.com
            - name: API_SERVER_MODEL_NAME
              value: hermes-agent
          envFrom:
            - secretRef:
                name: hermes-agent-env
          ports:
            - name: http
              containerPort: 8642
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-data
        - name: config
          configMap:
            name: hermes-agent-config
