apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes-agent
  namespace: hermes-agent
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
    external-dns.alpha.kubernetes.io/hostname: hermes-agent.api-api-api.com
    traefik.ingress.kubernetes.io/router.middlewares: hermes-agent-hermes-agent-root-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - secretName: hermes-agent-tls
      hosts:
        - hermes-agent.api-api-api.com
  rules:
    - host: hermes-agent.api-api-api.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes-agent
                port:
                  name: http
