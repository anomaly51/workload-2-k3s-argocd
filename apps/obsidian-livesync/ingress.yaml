apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: obsidian-livesync-couchdb
  namespace: obsidian-livesync
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    external-dns.alpha.kubernetes.io/hostname: obsidian-livesync.api-api-api.com
    external-dns.alpha.kubernetes.io/target: a6aaa50f-2590-4179-84f2-d0f18bce0587.cfargotunnel.com
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/ttl: "120"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - obsidian-livesync.api-api-api.com
      secretName: obsidian-livesync-tls
  rules:
    - host: obsidian-livesync.api-api-api.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: obsidian-livesync-couchdb
                port:
                  number: 5984
