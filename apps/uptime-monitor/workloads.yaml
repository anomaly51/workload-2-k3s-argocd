apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-monitor-api
  namespace: uptime-monitor
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: uptime-monitor-api
    app.kubernetes.io/part-of: workload-2
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: uptime-monitor-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: uptime-monitor-api
        app.kubernetes.io/part-of: workload-2
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do sleep 2; done
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: api
          image: harbor.api-api-api.com/uptime-monitor/app:main-49-09957ddb484a3b1ef4e003d199226d33e63d9329
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_VERSION
              value: "main-49-09957ddb484a3b1ef4e003d199226d33e63d9329"
            - name: PROJECT_NAME
              value: Uptime Monitor
            - name: APP_BASE_URL
              value: https://uptime-monitor.api-api-api.com
            - name: JWT_ISSUER
              value: uptime-monitor-api
            - name: JWT_AUDIENCE
              value: uptime-monitor-client
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "1440"
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              value: "14"
            - name: GOOGLE_CLIENT_ID
              value: "348661487643-kv602ltivacmm7k4crirrtnni2ibqefl.apps.googleusercontent.com"
            - name: GOOGLE_CLIENT_IDS
              value: ""
            - name: SMTP_HOST
              value: ""
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USERNAME
              value: ""
            - name: SMTP_PASSWORD
              value: ""
            - name: SMTP_FROM_EMAIL
              value: ""
            - name: SMTP_USE_TLS
              value: "true"
            - name: BILLING_PROVIDER
              value: manual
            - name: BILLING_CHECKOUT_BASE_URL
              value: ""
            - name: STRIPE_SECRET_KEY
              value: ""
            - name: STRIPE_STARTER_PRICE_ID
              value: ""
            - name: STRIPE_PRO_PRICE_ID
              value: ""
            - name: STRIPE_WEBHOOK_SECRET
              value: ""
            - name: PADDLE_API_KEY
              value: ""
            - name: PADDLE_ENVIRONMENT
              value: production
            - name: PADDLE_STARTER_PRICE_ID
              value: ""
            - name: PADDLE_PRO_PRICE_ID
              value: ""
            - name: PADDLE_WEBHOOK_SECRET
              value: ""
            - name: CHECK_QUEUE_NAME
              value: monitor_checks
            - name: SCHEDULER_TICK_SECONDS
              value: "30"
          envFrom:
            - secretRef:
                name: uptime-monitor-env
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 768Mi
---
