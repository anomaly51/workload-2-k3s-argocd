apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bot-motivation-env
  namespace: bot-motivation
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: bot-motivation-env
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: BOT_TOKEN
      remoteRef:
        key: workload-2/bot-motivation
        property: bot_token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: workload-2/bot-motivation
        property: openrouter_api_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: RAPID_API_KEY
      remoteRef:
        key: workload-2/bot-motivation
        property: rapid_api_key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: RAPID_API_HOST
      remoteRef:
        key: workload-2/bot-motivation
        property: rapid_api_host
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: RAPID_API_URL
      remoteRef:
        key: workload-2/bot-motivation
        property: rapid_api_url
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: GROUP_CHAT_ID
      remoteRef:
        key: workload-2/bot-motivation
        property: group_chat_id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: ADMIN_ID
      remoteRef:
        key: workload-2/bot-motivation
        property: admin_id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
---
