apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-motivation
  namespace: bot-motivation
  labels:
    app.kubernetes.io/name: bot-motivation
    app.kubernetes.io/part-of: workload-2
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: bot-motivation
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bot-motivation
        app.kubernetes.io/part-of: workload-2
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: motivator-bot
          image: harbor.api-api-api.com/bot-motivation/motivator-bot:main-1-8ce8993b87126b384ada2d34b52ae0a5123aff6f
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_VERSION
              value: "main-1-8ce8993b87126b384ada2d34b52ae0a5123aff6f"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: API_HOST
              value: 0.0.0.0
            - name: API_PORT
              value: "8080"
            - name: TMA_BASE_URL
              value: https://pets-void.api-api-api.com
            - name: BOT_DB_PATH
              value: /app/data/bot_data.db
            - name: TIKTOK_COOKIES_PATH
              value: /app/cookies.txt
          envFrom:
            - secretRef:
                name: bot-motivation-env
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: cookies
              mountPath: /app/cookies.txt
              subPath: cookies.txt
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: bot-motivation-data
        - name: cookies
          secret:
            secretName: bot-motivation-cookies
