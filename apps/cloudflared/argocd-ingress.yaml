apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-api
  namespace: argocd
  annotations:
    external-dns.alpha.kubernetes.io/hostname: argocd.api-api-api.com
    external-dns.alpha.kubernetes.io/target: a6aaa50f-2590-4179-84f2-d0f18bce0587.cfargotunnel.com
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/ttl: "120"
    traefik.ingress.kubernetes.io/service.serversscheme: https
    traefik.ingress.kubernetes.io/service.serverstransport: argocd-argocd-api@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: argocd.api-api-api.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  name: https
