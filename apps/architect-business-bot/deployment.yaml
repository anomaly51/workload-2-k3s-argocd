apiVersion: apps/v1
kind: Deployment
metadata:
  name: architect-business-bot
  namespace: architect-business-bot
  labels:
    app.kubernetes.io/name: architect-business-bot
    app.kubernetes.io/part-of: workload-2
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: architect-business-bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: architect-business-bot
        app.kubernetes.io/part-of: workload-2
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: bot
          image: harbor.api-api-api.com/architect-business-bot/bot:main-10-dd9747db5505aa3932222614fa69633e31f90728
          imagePullPolicy: IfNotPresent
          lifecycle:
            postStart:
              exec:
                command:
                  - python
                  - set_webhook.py
          env:
            - name: APP_VERSION
              value: "main-10-dd9747db5505aa3932222614fa69633e31f90728"
            - name: PUBLIC_WEBHOOK_URL
              value: https://architect-business-bot.api-api-api.com
            - name: OWNER_TELEGRAM_ID
              value: "794723616"
            - name: APP_HOST
              value: 0.0.0.0
            - name: APP_PORT
              value: "8080"
            - name: DB_PATH
              value: /app/data/architect.db
            - name: DEEPSEEK_BASE_URL
              value: https://openrouter.ai/api/v1
            - name: DEEPSEEK_MODEL
              value: deepseek/deepseek-v3.2
            - name: DEEPSEEK_TIMEOUT_SECONDS
              value: "45"
            - name: DEEPSEEK_TEMPERATURE
              value: "0.9"
            - name: DEEPSEEK_MAX_TOKENS
              value: "450"
            - name: AUTO_PAUSE_AFTER_OWNER_MESSAGE_SECONDS
              value: "1800"
            - name: MAX_HISTORY_MESSAGES
              value: "12"
          envFrom:
            - secretRef:
                name: architect-business-bot-env
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: architect-business-bot-data
