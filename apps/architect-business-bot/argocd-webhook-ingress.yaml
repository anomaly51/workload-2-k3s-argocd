apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: argocd-webhook
  namespace: argocd
spec:
  insecureSkipVerify: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: architect-business-bot-argocd-webhook
  namespace: argocd
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`architect-business-bot.api-api-api.com`) && PathPrefix(`/api/webhook`)
      priority: 1000
      services:
        - name: argocd-server
          port: 443
          scheme: https
          serversTransport: argocd-webhook
