apiVersion: apps/v1
kind: Deployment
metadata:
  name: pingme-backend
  namespace: pingme-backend
  labels:
    app.kubernetes.io/name: pingme-backend
    app.kubernetes.io/part-of: workload-2
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: pingme-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pingme-backend
        app.kubernetes.io/part-of: workload-2
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: backend
          image: harbor.api-api-api.com/pingme/backend:main-5-9fcff5f6c126b31ec124016173533a0c644da70e
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_VERSION
              value: "main-5-9fcff5f6c126b31ec124016173533a0c644da70e"
            - name: APP_BASE_URL
              value: https://pingme-backend.api-api-api.com
            - name: ALGORITHM
              value: HS256
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "30"
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              value: "7"
          envFrom:
            - secretRef:
                name: pingme-backend-env
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
