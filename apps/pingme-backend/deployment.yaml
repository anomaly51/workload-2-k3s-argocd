apiVersion: apps/v1
kind: Deployment
metadata:
  name: pingme-backend
  namespace: pingme-backend
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: pingme-backend
    app.kubernetes.io/part-of: workload-2
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pingme-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pingme-backend
        app.kubernetes.io/part-of: workload-2
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do sleep 2; done
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: backend
          image: harbor.api-api-api.com/pingme/backend:main-25-961d6ebb8a569191054dfca36aad3c17a72cb47e
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_VERSION
              value: "main-25-961d6ebb8a569191054dfca36aad3c17a72cb47e"
            - name: APP_BASE_URL
              value: https://pingme-backend.api-api-api.com
            - name: ALGORITHM
              value: HS256
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "30"
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              value: "7"
          envFrom:
            - secretRef:
                name: pingme-backend-env
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: google-services
              mountPath: /code/google_services.json
              subPath: google_services.json
              readOnly: true
      volumes:
        - name: google-services
          secret:
            secretName: pingme-backend-env
            items:
              - key: google_services.json
                path: google_services.json
