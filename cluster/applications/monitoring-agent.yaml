apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  project: gitops-apps
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: 29.7.0
    helm:
      releaseName: prometheus
      values: |
        configmapReload:
          prometheus:
            enabled: false
        alertmanager:
          enabled: false
        prometheus-pushgateway:
          enabled: false
        prometheus:
          enabled: false
        server:
          global:
            external_labels:
              cluster: workload-2
          persistentVolume:
            enabled: false
          remoteWrite:
            - url: http://192.168.1.104:30090/api/v1/write
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
